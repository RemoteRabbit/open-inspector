---
name: docs-cli

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make docs-cli
      - run: |
          if ! git diff --exit-code docs/cli docs/man; then
            echo "::error::CLI docs are stale. Run 'make docs-cli' locally and commit the results." >&2
            exit 1
          fi
