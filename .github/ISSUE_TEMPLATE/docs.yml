name: Documentation issue
description: Report unclear, missing, or incorrect documentation.
title: "docs: <short summary>"
labels: ["documentation"]
body:
  - type: textarea
    id: location
    attributes:
      label: Where
      description: Which doc, README section, doc comment, or generated artifact?
      placeholder: README "Design thesis", pkg/model doc comment, JSON Schema, ...
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is wrong or missing?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested change
    validations:
      required: false
