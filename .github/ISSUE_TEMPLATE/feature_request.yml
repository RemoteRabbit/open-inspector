name: Feature request
description: Suggest new modeled fields, inspections, or CLI/library capabilities.
title: "feat: <short summary>"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Note the project's design invariants (see `AGENTS.md`
        and the README "Design thesis"): the loader **captures, never evaluates**
        expressions, decoding is **schema-driven and partial**, and the model is
        the stable contract. Proposals that fit those invariants are easiest to land.
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to do that open-inspector cannot do today?
      placeholder: I want to inspect ... so that ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: >-
        What should change? If this adds a model field, describe its name, type,
        and JSON shape. New fields are additive (`omitempty`) and should not bump
        `model.SchemaVersion`.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - Model (pkg/model)
        - Config loader (pkg/config)
        - Inspector API (pkg/inspector)
        - Graph (pkg/graph)
        - Schema (pkg/schema)
        - CLI (cmd/open-inspector)
        - Docs
        - Other
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Example config / expected model
      description: A config snippet and the model/output you would expect from it.
      render: hcl
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why they fall short.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this has not been requested.
          required: true
        - label: This proposal is consistent with the "capture, never evaluate" invariant.
          required: false
